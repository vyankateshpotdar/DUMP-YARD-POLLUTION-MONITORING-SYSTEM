<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollution Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .card { box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-radius: 10px; }
        .alert-card { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="header">
            <h1>🌍 Dump Yard Pollution Monitor</h1>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card alert-card">
                    <div class="card-body">
                        <h5>🌡️ Temperature</h5>
                        <h2 id="temperature">--°C</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card alert-card">
                    <div class="card-body">
                        <h5>💨 Humidity</h5>
                        <h2 id="humidity">--%</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card alert-card">
                    <div class="card-body">
                        <h5>🔴 Severity</h5>
                        <h2 id="severity">--</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5>⚠️ Alerts</h5>
                        <table class="table" id="alertsTable">
                            <tbody id="alertsBody"><tr><td>Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function updateDashboard() {
            $.get('/api/pollution/latest', function(data) {
                if (data) {
                    $('#temperature').text(data.temperature.toFixed(1) + '°C');
                    $('#humidity').text(data.humidity.toFixed(1) + '%');
                    $('#severity').text(data.severity);
                }
            });
            $.get('/api/pollution/alerts', function(data) {
                let rows = '';
                data.slice(0, 10).forEach(alert => {
                    rows += '<tr><td>' + new Date(alert.timestamp).toLocaleTimeString() + '</td><td>' + alert.temperature + '°C</td><td>' + alert.humidity + '%</td></tr>';
                });
                $('#alertsBody').html(rows || '<tr><td>No alerts</td></tr>');
            });
        }
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
